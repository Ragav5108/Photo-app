<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Glowing</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-primary: #00f5ff;
            --glow-secondary: #ff00ff;
            --glow-accent: #ffff00;
            --glow-danger: #ff0055;
            --glow-success: #00ff88;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --bg-input: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,0,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle, rgba(0,245,255,0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Container */
        .container {
            background: var(--bg-card);
            border-radius: 20px;
            border: 2px solid transparent;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3),
                        0 0 60px rgba(0, 245, 255, 0.2),
                        inset 0 0 30px rgba(255, 0, 255, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 35px;
            position: relative;
            animation: containerGlow 3s ease-in-out infinite;
        }

        @keyframes containerGlow {
            0%, 100% { 
                border-color: rgba(255, 0, 255, 0.5);
                box-shadow: 0 0 30px rgba(255, 0, 255, 0.3),
                            0 0 60px rgba(0, 245, 255, 0.2),
                            inset 0 0 30px rgba(255, 0, 255, 0.1);
            }
            50% { 
                border-color: rgba(0, 245, 255, 0.5);
                box-shadow: 0 0 40px rgba(0, 245, 255, 0.4),
                            0 0 80px rgba(255, 0, 255, 0.3),
                            inset 0 0 40px rgba(0, 245, 255, 0.1);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 25px;            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 245, 255, 0.3);
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--glow-secondary),
                         0 0 20px var(--glow-secondary);
        }

        .header p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Navigation */
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .nav-link {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--glow-primary);
            border-radius: 8px;
            color: var(--glow-primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--glow-primary);
            color: var(--bg-dark);            box-shadow: 0 0 15px rgba(0, 245, 255, 0.5);
        }

        /* Sections */
        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: var(--glow-primary);
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--glow-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Forms */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid rgba(0, 245, 255, 0.3);            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--glow-primary);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--glow-primary), var(--glow-secondary));
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 0 25px rgba(0, 245, 255, 0.6),
                        0 0 40px rgba(255, 0, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: transparent;
            border: 2px solid var(--glow-danger);
            color: var(--glow-danger);            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        .btn-danger:hover {
            background: var(--glow-danger);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--text-secondary);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-group .btn {
            flex: 1;
        }

        /* Messages */
        .msg {
            font-size: 13px;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: none;
            text-align: center;
        }

        .msg.error {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid var(--glow-danger);
            color: var(--glow-danger);            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        .msg.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--glow-success);
            color: var(--glow-success);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .msg.show {
            display: block;
            animation: msgGlow 2s ease-in-out infinite;
        }

        @keyframes msgGlow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* File Upload */
        .file-upload {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.5), transparent);
            margin: 25px 0;
        }

        /* Back Link */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: var(--glow-primary);
            text-shadow: 0 0 10px var(--glow-primary);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>

    <div class="container">
        <div class="header">
            <h1>⚡ Admin Panel</h1>
            <p>Manage your glowing profile</p>
        </div>

        <!-- Navigation Tabs -->
        <div class="nav-links" id="nav-links" style="display: none;">
            <button class="nav-link active" onclick="showSection('photo')">📷 Photo</button>
            <button class="nav-link" onclick="showSection('message')">💬 Message</button>
            <button class="nav-link" onclick="showSection('credentials')">🔐 Credentials</button>
        </div>

        <!-- Login Section -->
        <div id="login-section" class="section active">
            <div class="msg error" id="login-error"></div>
            
            <div class="form-group">
                <label>USERNAME</label>                <input type="text" id="login-username" placeholder="Enter username">
            </div>
            
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="login-password" placeholder="Enter password">
            </div>
            
            <button class="btn btn-primary" id="login-btn" onclick="login()">🔓 Login</button>
            
            <p style="text-align: center; margin-top: 15px; font-size: 12px; color: var(--text-secondary);">
                Default: <strong style="color: var(--glow-primary);">admin</strong> / <strong style="color: var(--glow-primary);">1234</strong>
            </p>
            
            <a href="index.html" class="back-link">← Back to Profile</a>
        </div>

        <!-- Photo Section -->
        <div id="photo-section" class="section">
            <div class="section-title">📷 Upload Photo</div>
            
            <div class="msg success" id="photo-success"></div>
            <div class="msg error" id="photo-error"></div>
            
            <div class="file-upload">
                <button class="btn btn-secondary">📁 Choose Photo</button>
                <input type="file" id="photo-input" accept="image/*" onchange="uploadPhoto()">
            </div>
            
            <div class="btn-group">
                <button class="btn btn-danger" onclick="deletePhoto()" id="delete-photo-btn">🗑️ Delete Photo</button>
            </div>
            
            <a href="index.html" class="back-link">👁️ View Public Profile</a>
        </div>

        <!-- Message Section -->
        <div id="message-section" class="section">
            <div class="section-title">💬 Update Message</div>
            
            <div class="msg success" id="message-success"></div>
            
            <div class="form-group">
                <label>YOUR MESSAGE</label>
                <textarea id="message-input" placeholder="Write your glowing message..."></textarea>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-primary" onclick="updateMessage()" id="update-message-btn">✨ Update</button>
                <button class="btn btn-danger" onclick="deleteMessage()">🗑️ Delete</button>            </div>
        </div>

        <!-- Credentials Section -->
        <div id="credentials-section" class="section">
            <div class="section-title">🔐 Update Credentials</div>
            
            <div class="msg success" id="credentials-success"></div>
            <div class="msg error" id="credentials-error"></div>
            
            <div class="form-group">
                <label>CURRENT PASSWORD</label>
                <input type="password" id="current-password" placeholder="Enter current password">
            </div>
            
            <div class="form-group">
                <label>NEW USERNAME (optional)</label>
                <input type="text" id="new-username" placeholder="Enter new username">
            </div>
            
            <div class="form-group">
                <label>NEW PASSWORD (optional)</label>
                <input type="password" id="new-password" placeholder="Enter new password">
            </div>
            
            <button class="btn btn-primary" onclick="updateCredentials()" id="update-credentials-btn">🔐 Update</button>
        </div>

        <!-- Logout -->
        <button class="btn btn-secondary" id="logout-btn" style="display: none; margin-top: 20px;" onclick="logout()">🚪 Logout</button>
    </div>

    <script>
        let currentUser = null;

        // Show Message Helper
        function showMessage(id, text, type) {
            const el = document.getElementById(id);
            el.className = `msg ${type} show`;
            el.innerText = text;
            setTimeout(() => {
                el.className = `msg ${type}`;
                el.innerText = '';
            }, 3000);
        }

        // Show Section
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));            
            document.getElementById(section + '-section').classList.add('active');
            event.target.classList.add('active');
        }

        // Login
        async function login() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');

            if (!username || !password) {
                showMessage('login-error', 'Please fill in all fields', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Logging in...';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    currentUser = data;
                    document.getElementById('login-section').classList.remove('active');
                    document.getElementById('nav-links').style.display = 'flex';
                    document.getElementById('logout-btn').style.display = 'block';
                    document.getElementById('message-input').value = currentUser.message || '';
                    showSection('photo');
                } else {
                    showMessage('login-error', data.message, 'error');
                }
            } catch (err) {
                showMessage('login-error', 'Connection error', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = '🔓 Login';
            }
        }

        // Logout
        function logout() {
            if (!confirm('Logout?')) return;
            
            currentUser = null;            document.getElementById('login-section').classList.add('active');
            document.getElementById('photo-section').classList.remove('active');
            document.getElementById('message-section').classList.remove('active');
            document.getElementById('credentials-section').classList.remove('active');
            document.getElementById('nav-links').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
            document.getElementById('current-password').value = '';
            document.getElementById('new-username').value = '';
            document.getElementById('new-password').value = '';
        }

        // Upload Photo
        async function uploadPhoto() {
            const file = document.getElementById('photo-input').files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('photo', file);

            try {
                const res = await fetch('/upload-photo', { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    currentUser.photo = data.photo;
                    showMessage('photo-success', 'Photo uploaded!', 'success');
                } else {
                    showMessage('photo-error', data.message, 'error');
                }
            } catch (err) {
                showMessage('photo-error', 'Connection error', 'error');
            } finally {
                document.getElementById('photo-input').value = '';
            }
        }

        // Delete Photo
        async function deletePhoto() {
            if (!confirm('Delete photo?')) return;

            try {
                const res = await fetch('/delete-photo', { method: 'DELETE' });
                const data = await res.json();

                if (data.success) {
                    currentUser.photo = null;
                    showMessage('photo-success', 'Photo deleted!', 'success');
                }            } catch (err) {
                showMessage('photo-error', 'Connection error', 'error');
            }
        }

        // Update Message
        async function updateMessage() {
            const message = document.getElementById('message-input').value.trim();
            const btn = document.getElementById('update-message-btn');

            btn.disabled = true;

            try {
                const res = await fetch('/update-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();

                if (data.success) {
                    currentUser.message = data.message;
                    showMessage('message-success', 'Message updated!', 'success');
                }
            } catch (err) {
                showMessage('message-success', 'Connection error', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        // Delete Message
        async function deleteMessage() {
            if (!confirm('Delete message?')) return;

            try {
                const res = await fetch('/delete-message', { method: 'DELETE' });
                const data = await res.json();

                if (data.success) {
                    currentUser.message = '';
                    document.getElementById('message-input').value = '';
                    showMessage('message-success', 'Message deleted!', 'success');
                }
            } catch (err) {
                showMessage('message-success', 'Connection error', 'error');
            }
        }

        // Update Credentials        async function updateCredentials() {
            const currentPassword = document.getElementById('current-password').value;
            const newUsername = document.getElementById('new-username').value.trim();
            const newPassword = document.getElementById('new-password').value;
            const btn = document.getElementById('update-credentials-btn');

            if (!currentPassword) {
                showMessage('credentials-error', 'Current password is required', 'error');
                return;
            }

            if (!newUsername && !newPassword) {
                showMessage('credentials-error', 'Enter new username or password', 'error');
                return;
            }

            btn.disabled = true;

            try {
                const res = await fetch('/update-credentials', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: currentUser.username,
                        password: currentPassword,
                        newUsername: newUsername,
                        newPassword: newPassword
                    })
                });
                const data = await res.json();

                if (data.success) {
                    currentUser.username = data.username;
                    if (newPassword) currentUser.password = newPassword;
                    
                    document.getElementById('current-password').value = '';
                    document.getElementById('new-username').value = '';
                    document.getElementById('new-password').value = '';
                    
                    showMessage('credentials-success', 'Credentials updated!', 'success');
                } else {
                    showMessage('credentials-error', data.message, 'error');
                }
            } catch (err) {
                showMessage('credentials-error', 'Connection error', 'error');
            } finally {
                btn.disabled = false;
            }
        }
        // Enter key for login
        document.getElementById('login-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
