<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-User Photo App</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; margin: 5px 0; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        button.secondary:hover { background: #545b62; }
        button.danger { background: #dc3545; }
        button.danger:hover { background: #c82333; }
        .hidden { display: none; }
        #photo-preview { width: 100%; height: 200px; object-fit: cover; background: #eee; margin-bottom: 10px; display: none; border-radius: 4px; }
        .error { color: red; font-size: 0.9em; text-align: center; }
        .success { color: green; font-size: 0.9em; text-align: center; }
        .user-list { max-height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin: 10px 0; }
        .user-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #eee; }
        .user-item:last-child { border-bottom: none; }
        h2 { text-align: center; color: #333; }
        .tabs { display: flex; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #ddd; }
        .tab.active { background: #007bff; color: white; }
        .welcome { text-align: center; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- LOGIN/REGISTER SECTION -->
        <div id="auth-section">
            <div class="tabs">
                <div class="tab active" onclick="showTab('login')">Login</div>
                <div class="tab" onclick="showTab('register')">Register</div>
            </div>
            
            <!-- Login Form -->
            <div id="login-form">
                <h2>Login</h2>
                <p class="error" id="login-error"></p>
                <input type="text" id="login-user" placeholder="Username">
                <input type="password" id="login-pass" placeholder="Password">
                <button onclick="login()">Login</button>
            </div>
            
            <!-- Register Form -->            <div id="register-form" class="hidden">
                <h2>Create Account</h2>
                <p class="error" id="register-error"></p>
                <p class="success" id="register-success"></p>
                <input type="text" id="reg-user" placeholder="Choose Username">
                <input type="password" id="reg-pass" placeholder="Choose Password">
                <button onclick="register()">Create Account</button>
            </div>
            
            <!-- User List -->
            <div style="margin-top: 20px;">
                <h3>Existing Users:</h3>
                <div class="user-list" id="user-list">Loading...</div>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard-section" class="hidden">
            <h2>My Profile</h2>
            <p class="welcome">Welcome, <strong id="current-username"></strong>!</p>
            
            <img id="photo-preview" src="" alt="Profile Photo">
            
            <form id="update-form">
                <input type="text" id="new-username" placeholder="New Username (optional)">
                <input type="password" id="new-password" placeholder="New Password (optional)">
                <label for="new-photo" style="font-size: 0.9em; color: #666;">Update Photo:</label>
                <input type="file" id="new-photo" accept="image/*">
                <button type="submit">Save Changes</button>
                <button type="button" class="secondary" onclick="viewAllUsers()">View All Users</button>
                <button type="button" class="danger" onclick="logout()">Logout</button>
            </form>
        </div>
        
        <!-- All Users View -->
        <div id="all-users-section" class="hidden">
            <h2>All Users</h2>
            <div class="user-list" id="all-user-list" style="max-height: 300px;"></div>
            <button class="secondary" onclick="backToDashboard()">Back to Dashboard</button>
        </div>
    </div>

    <script>
        let currentUser = null;

        // Tab Switching
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
            }
            loadUserList();
        }

        // Load User List
        async function loadUserList() {
            try {
                const res = await fetch('/users');
                const users = await res.json();
                const listDiv = document.getElementById('user-list');
                listDiv.innerHTML = users.map(u => 
                    `<div class="user-item">
                        <span>${u.username} ${u.hasPhoto ? '📷' : ''}</span>
                    </div>`
                ).join('');
            } catch (err) {
                document.getElementById('user-list').innerText = 'Error loading users';
            }
        }

        // Login
        async function login() {
            const username = document.getElementById('login-user').value;
            const password = document.getElementById('login-pass').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    currentUser = data.username;
                    loadDashboard(data);
                } else {
                    document.getElementById('login-error').innerText = data.message;
                }
            } catch (err) {
                console.error(err);
            }
        }
        // Register
        async function register() {
            const username = document.getElementById('reg-user').value;
            const password = document.getElementById('reg-pass').value;

            if (!username || !password) {
                document.getElementById('register-error').innerText = "Please fill all fields";
                return;
            }

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('register-success').innerText = data.message;
                    document.getElementById('register-error').innerText = "";
                    // Auto-login after registration
                    setTimeout(() => {
                        document.getElementById('login-user').value = username;
                        document.getElementById('login-pass').value = password;
                        showTab('login');
                        login();
                    }, 1000);
                } else {
                    document.getElementById('register-error').innerText = data.message;
                    document.getElementById('register-success').innerText = "";
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Load Dashboard
        function loadDashboard(userData) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
            document.getElementById('current-username').innerText = userData.username;
            document.getElementById('new-username').value = userData.username;
            
            if (userData.photo) {
                const img = document.getElementById('photo-preview');
                img.src = '/uploads/' + userData.photo + '?t=' + new Date().getTime();
                img.style.display = 'block';
            }
        }
        // Update Profile
        document.getElementById('update-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('username', currentUser);
            
            const newUsername = document.getElementById('new-username').value;
            const newPassword = document.getElementById('new-password').value;
            
            if (newUsername && newUsername !== currentUser) {
                formData.append('newUsername', newUsername);
            }
            if (newPassword) {
                formData.append('newPassword', newPassword);
            }
            
            const fileInput = document.getElementById('new-photo');
            if (fileInput.files[0]) {
                formData.append('photo', fileInput.files[0]);
            }

            try {
                const res = await fetch('/update', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.success) {
                    alert("Updated Successfully!");
                    if (newUsername) {
                        currentUser = newUsername;
                        document.getElementById('current-username').innerText = newUsername;
                    }
                    loadDashboard({ username: data.username, photo: data.photo });
                } else {
                    alert(data.message);
                }
            } catch (err) {
                console.error(err);
            }
        });

        // View All Users
        async function viewAllUsers() {
            document.getElementById('dashboard-section').classList.add('hidden');
            document.getElementById('all-users-section').classList.remove('hidden');
                        try {
                const res = await fetch('/users');
                const users = await res.json();
                const listDiv = document.getElementById('all-user-list');
                listDiv.innerHTML = users.map(u => 
                    `<div class="user-item">
                        <span>${u.username} ${u.hasPhoto ? '📷' : ''}</span>
                        ${u.username !== currentUser ? `<button class="danger" style="width:auto;padding:5px 10px;font-size:0.8em" onclick="deleteUser('${u.username}')">Delete</button>` : ''}
                    </div>`
                ).join('');
            } catch (err) {
                document.getElementById('all-user-list').innerText = 'Error loading users';
            }
        }

        // Delete User
        async function deleteUser(username) {
            if (!confirm(`Delete user ${username}?`)) return;
            
            try {
                const res = await fetch(`/user/${username}`, { method: 'DELETE' });
                const data = await res.json();
                alert(data.message);
                viewAllUsers();
            } catch (err) {
                console.error(err);
            }
        }

        // Back to Dashboard
        function backToDashboard() {
            document.getElementById('all-users-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.remove('hidden');
        }

        // Logout
        function logout() {
            currentUser = null;
            document.getElementById('dashboard-section').classList.add('hidden');
            document.getElementById('all-users-section').classList.add('hidden');
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
            document.getElementById('login-error').innerText = '';
            loadUserList();
        }

        // Initialize
        loadUserList();
    </script></body>
</html>
