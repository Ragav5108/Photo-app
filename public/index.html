<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoGram</title>
    <link href="https://fonts.googleapis.com/css2?family=System-ui&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --border: #DBDBDB;
            --text-primary: #262626;
            --text-secondary: #8E8E8E;
            --blue: #0095F6;
            --blue-hover: #1877F2;
            --red: #ED4956;
            --gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
        }

        /* Top Navigation */
        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .nav-logo {
            font-size: 28px;            font-weight: 700;
            font-family: 'Cochin', 'Segoe UI', serif;
            letter-spacing: -1px;
        }

        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: var(--text-primary);
        }

        .nav-btn:hover {
            opacity: 0.6;
        }

        /* Container */
        .main-container {
            max-width: 935px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }

        /* Login Card */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
            max-width: 350px;
            margin: 30px auto;
            text-align: center;
        }

        .login-logo {
            font-size: 42px;
            font-weight: 700;
            font-family: 'Cochin', 'Segoe UI', serif;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .form-input {            width: 100%;
            padding: 9px 8px;
            margin-bottom: 6px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 12px;
            background: #FAFAFA;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--text-secondary);
        }

        .btn-login {
            width: 100%;
            padding: 7px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: var(--blue-hover);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            padding: 0 15px;            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }

        .error-msg {
            color: var(--red);
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Profile Page */
        .profile-container {
            display: none;
        }

        .profile-header {
            display: flex;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .profile-pic-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding-right: 50px;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border);
            padding: 3px;
            background: var(--surface);
        }

        .profile-pic-placeholder {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--gradient);            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: 300;
        }

        .profile-info {
            flex: 2;
        }

        .profile-username-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .profile-username {
            font-size: 28px;
            font-weight: 300;
        }

        .btn-edit {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 5px 9px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-edit:hover {
            background: #FAFAFA;
        }

        .btn-logout {
            background: transparent;
            border: none;
            color: var(--red);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-new-post {
            background: var(--blue);            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 9px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-new-post:hover {
            background: var(--blue-hover);
        }

        .profile-stats {
            display: flex;
            margin-bottom: 20px;
        }

        .stat-item {
            margin-right: 40px;
        }

        .stat-number {
            font-weight: 600;
            font-size: 16px;
        }

        .stat-label {
            color: var(--text-primary);
            font-size: 14px;
        }

        .profile-bio {
            font-size: 14px;
            line-height: 1.5;
        }

        .profile-bio .name {
            font-weight: 600;
        }

        /* Posts Grid */
        .posts-section {
            margin-top: 30px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;            margin-top: 20px;
        }

        .post-item {
            position: relative;
            aspect-ratio: 1;
            background: #EFEFEF;
            cursor: pointer;
            border-radius: 3px;
            overflow: hidden;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .post-overlay span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .post-item:hover .post-overlay {
            display: flex;
        }

        .empty-posts {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-posts-icon {            font-size: 48px;
            margin-bottom: 15px;
        }

        .empty-posts-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .empty-posts-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Create Post Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-form-group {
            margin-bottom: 16px;
        }

        .modal-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .modal-input {
            width: 100%;
            padding: 9px 8px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 14px;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--text-secondary);
        }

        .modal-textarea {
            width: 100%;
            padding: 9px 8px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;            min-height: 80px;
        }

        .modal-textarea:focus {
            outline: none;
            border-color: var(--text-secondary);
        }

        .modal-btn {
            width: 100%;
            padding: 7px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn:disabled {
            opacity: 0.5;
        }

        .photo-upload-preview {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 3px;
            margin-bottom: 10px;
            display: none;
        }

        .photo-upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
        }

        .photo-upload-area:hover {
            background: #FAFAFA;
        }
        .photo-upload-area svg {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* Post Detail Modal */
        .post-detail-modal {
            max-width: 800px;
            display: flex;
            flex-direction: row;
        }

        .post-detail-image {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .post-detail-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-height: 500px;
        }

        .post-detail-info {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .post-detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .post-detail-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gradient);            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 12px;
        }

        .post-detail-username {
            font-weight: 600;
            font-size: 14px;
        }

        .post-detail-message {
            flex: 1;
            font-size: 14px;
            line-height: 1.5;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .post-detail-actions {
            display: flex;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .post-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 24px;
            color: var(--text-primary);
        }

        .post-action-btn:hover {
            opacity: 0.6;
        }

        .post-action-btn.liked {
            color: var(--red);
        }

        .post-date {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 10px;
        }
        .btn-delete-post {
            background: var(--red);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 9px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-edit-post {
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 9px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 735px) {
            .profile-header {
                flex-direction: column;
                padding: 20px 0;
            }

            .profile-pic-container {
                padding-right: 0;
                margin-bottom: 20px;
            }

            .profile-pic,
            .profile-pic-placeholder {
                width: 77px;
                height: 77px;
                font-size: 28px;
            }

            .profile-username {                font-size: 20px;
            }

            .posts-grid {
                gap: 3px;
            }

            .post-detail-modal {
                flex-direction: column;
                max-width: 100%;
            }

            .post-detail-image img {
                max-height: 300px;
            }

            .nav {
                justify-content: center;
            }

            .nav-actions {
                position: absolute;
                right: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-logo">PhotoGram</div>
        <div class="nav-actions hidden" id="nav-actions">
            <button class="nav-btn" onclick="openCreatePostModal()" title="Create Post">➕</button>
            <button class="nav-btn" onclick="logout()" title="Logout">🚪</button>
        </div>
    </nav>

    <div class="main-container">
        <!-- Login Section -->
        <div id="login-section">
            <div class="login-card">
                <div class="login-logo">PhotoGram</div>
                
                <p class="error-msg" id="login-error"></p>
                
                <input type="text" class="form-input" id="login-username" placeholder="Username" autocomplete="username">
                <input type="password" class="form-input" id="login-password" placeholder="Password" autocomplete="current-password">
                
                <button class="btn-login" id="login-btn" onclick="login()">Log In</button>                
                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-text">OR</div>
                    <div class="divider-line"></div>
                </div>
                
                <p style="font-size: 12px; color: var(--text-secondary);">
                    Default: <strong>myaccount</strong> / <strong>1234</strong>
                </p>
            </div>
            
            <div class="login-card" style="padding: 20px;">
                <p style="font-size: 14px;">
                    Share your photos with messages 📸
                </p>
            </div>
        </div>

        <!-- Profile Section -->
        <div id="profile-section" class="profile-container">
            <div class="profile-header">
                <div class="profile-pic-container">
                    <img id="profile-pic" class="profile-pic" src="" alt="Profile" style="display: none;">
                    <div id="profile-pic-placeholder" class="profile-pic-placeholder">M</div>
                </div>
                
                <div class="profile-info">
                    <div class="profile-username-row">
                        <h1 class="profile-username" id="profile-username">myaccount</h1>
                        <button class="btn-edit" onclick="openEditProfileModal()">Edit Profile</button>
                        <button class="btn-new-post" onclick="openCreatePostModal()">+ New Post</button>
                    </div>
                    
                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-number" id="posts-count">0</span>
                            <span class="stat-label">posts</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number">0</span>
                            <span class="stat-label">followers</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number">0</span>
                            <span class="stat-label">following</span>
                        </div>
                    </div>
                    
                    <div class="profile-bio">                        <span class="name" id="profile-name">myaccount</span>
                        <p id="profile-bio-text">Welcome to my profile 📸</p>
                    </div>
                </div>
            </div>
            
            <!-- Posts Section -->
            <div class="posts-section">
                <div class="posts-grid" id="posts-grid">
                    <!-- Posts will be shown here -->
                </div>
                
                <div class="empty-posts" id="empty-posts">
                    <div class="empty-posts-icon">📷</div>
                    <div class="empty-posts-title">No Posts Yet</div>
                    <div class="empty-posts-text">Share your first photo with a message</div>
                    <button class="btn-new-post" onclick="openCreatePostModal()" style="margin-top: 15px;">+ Create Post</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Post Modal -->
    <div class="modal-overlay" id="create-post-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="create-post-title">Create New Post</span>
                <button class="modal-close" onclick="closeCreatePostModal()">&times;</button>
            </div>
            
            <div class="modal-body">
                <img id="create-photo-preview" class="photo-upload-preview" src="" alt="Preview">
                
                <div class="photo-upload-area" id="photo-upload-area" onclick="document.getElementById('create-photo').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span>Click to upload photo</span>
                </div>
                <input type="file" id="create-photo" accept="image/*" style="display: none;" onchange="previewCreatePhoto()">
                
                <div class="modal-form-group" style="margin-top: 20px;">
                    <label class="modal-label">Write a message... (optional)</label>
                    <textarea class="modal-textarea" id="create-message" placeholder="Share your thoughts about this photo" maxlength="500"></textarea>
                </div>
                
                <button class="modal-btn" id="create-post-btn" onclick="createPost()">Share</button>
            </div>        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="edit-profile-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Edit Profile</span>
                <button class="modal-close" onclick="closeEditProfileModal()">&times;</button>
            </div>
            
            <div class="modal-body">
                <img id="edit-photo-preview" class="photo-upload-preview" src="" alt="Preview" style="height: 150px; width: 150px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px; display: none;">
                
                <label class="photo-upload-area" style="padding: 15px;" onclick="document.getElementById('edit-photo').click()">
                    📷 Change Profile Photo
                </label>
                <input type="file" id="edit-photo" accept="image/*" style="display: none;" onchange="previewEditPhoto()">
                
                <div class="modal-form-group" style="margin-top: 20px;">
                    <label class="modal-label">Username</label>
                    <input type="text" class="modal-input" id="edit-username" placeholder="Username">
                </div>
                
                <div class="modal-form-group">
                    <label class="modal-label">Password</label>
                    <input type="password" class="modal-input" id="edit-password" placeholder="New Password (optional)">
                </div>
                
                <div class="modal-form-group">
                    <label class="modal-label">Bio</label>
                    <input type="text" class="modal-input" id="edit-bio" placeholder="Bio" maxlength="150">
                </div>
                
                <button class="modal-btn" id="save-profile-btn" onclick="saveProfile()">Save</button>
            </div>
        </div>
    </div>

    <!-- Post Detail Modal -->
    <div class="modal-overlay" id="post-detail-modal">
        <div class="modal post-detail-modal">
            <div class="post-detail-image">
                <img id="post-detail-img" src="" alt="Post">
            </div>
            <div class="post-detail-info">
                <div class="post-detail-header">
                    <div class="post-detail-avatar" id="post-detail-avatar">M</div>
                    <span class="post-detail-username" id="post-detail-username">myaccount</span>
                </div>                <div class="post-detail-message" id="post-detail-message"></div>
                <div class="post-date" id="post-detail-date"></div>
                <div class="post-detail-actions">
                    <button class="post-action-btn" id="post-like-btn" onclick="likeCurrentPost()">❤️</button>
                    <button class="post-action-btn" onclick="editCurrentPost()">✏️</button>
                    <button class="post-action-btn" onclick="deleteCurrentPost()">🗑️</button>
                </div>
                <button class="modal-close" onclick="closePostDetailModal()" style="position: absolute; top: 10px; right: 10px; font-size: 30px;">&times;</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentPosts = [];
        let currentPostId = null;
        let editingPostId = null;

        // Login
        async function login() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            if (!username || !password) {
                errorEl.innerText = 'Please fill in all fields';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Logging in...';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    currentUser = data;
                    currentPosts = data.posts || [];
                    showProfile(data);
                } else {
                    errorEl.innerText = data.message;
                    errorEl.classList.add('show');
                }            } catch (err) {
                errorEl.innerText = 'Connection error. Please try again.';
                errorEl.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Log In';
            }
        }

        // Show Profile
        function showProfile(data) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('profile-section').style.display = 'block';
            document.getElementById('nav-actions').classList.remove('hidden');
            
            document.getElementById('profile-username').innerText = data.username;
            document.getElementById('profile-name').innerText = data.username;
            document.getElementById('profile-bio-text').innerText = data.bio || 'Welcome to my profile 📸';
            
            const pic = document.getElementById('profile-pic');
            const placeholder = document.getElementById('profile-pic-placeholder');
            
            if (data.photo) {
                pic.src = '/uploads/' + data.photo + '?t=' + new Date().getTime();
                pic.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                pic.style.display = 'none';
                placeholder.style.display = 'flex';
                placeholder.innerText = data.username.charAt(0).toUpperCase();
            }
            
            renderPosts();
        }

        // Render Posts
        function renderPosts() {
            const grid = document.getElementById('posts-grid');
            const empty = document.getElementById('empty-posts');
            
            document.getElementById('posts-count').innerText = currentPosts.length;
            
            if (currentPosts.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            
            empty.style.display = 'none';
            grid.innerHTML = currentPosts.map(post => `                <div class="post-item" onclick="openPostDetail(${post.id})">
                    <img src="/uploads/${post.photo}" alt="Post">
                    <div class="post-overlay">
                        <span>❤️ ${post.likes || 0}</span>
                        <span>💬 ${post.message ? '1' : '0'}</span>
                    </div>
                </div>
            `).join('');
        }

        // Logout
        function logout() {
            if (!confirm('Log out of this account?')) return;
            
            currentUser = null;
            currentPosts = [];
            document.getElementById('profile-section').style.display = 'none';
            document.getElementById('nav-actions').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
            document.getElementById('login-error').classList.remove('show');
        }

        // Create Post Modal
        function openCreatePostModal() {
            editingPostId = null;
            document.getElementById('create-post-title').innerText = 'Create New Post';
            document.getElementById('create-post-modal').classList.add('show');
            document.getElementById('create-message').value = '';
            document.getElementById('create-photo').value = '';
            document.getElementById('create-photo-preview').style.display = 'none';
            document.getElementById('photo-upload-area').style.display = 'flex';
        }

        function closeCreatePostModal() {
            document.getElementById('create-post-modal').classList.remove('show');
        }

        function previewCreatePhoto() {
            const file = document.getElementById('create-photo').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('create-photo-preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('photo-upload-area').style.display = 'none';
                };
                reader.readAsDataURL(file);            }
        }

        // Create Post
        async function createPost() {
            const message = document.getElementById('create-message').value.trim();
            const file = document.getElementById('create-photo').files[0];
            
            if (!file) {
                alert('Please select a photo');
                return;
            }

            const formData = new FormData();
            formData.append('photo', file);
            formData.append('message', message);

            const btn = document.getElementById('create-post-btn');
            btn.disabled = true;
            btn.innerText = 'Sharing...';

            try {
                const res = await fetch('/create-post', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.success) {
                    currentPosts.unshift(data.post);
                    renderPosts();
                    closeCreatePostModal();
                    alert('Post shared successfully! 🎉');
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Share';
            }
        }

        // Edit Profile Modal
        function openEditProfileModal() {
            document.getElementById('edit-profile-modal').classList.add('show');
            document.getElementById('edit-username').value = currentUser.username;
            document.getElementById('edit-bio').value = currentUser.bio || '';
            document.getElementById('edit-password').value = '';            
            if (currentUser.photo) {
                const preview = document.getElementById('edit-photo-preview');
                preview.src = '/uploads/' + currentUser.photo + '?t=' + new Date().getTime();
                preview.style.display = 'block';
            }
        }

        function closeEditProfileModal() {
            document.getElementById('edit-profile-modal').classList.remove('show');
        }

        function previewEditPhoto() {
            const file = document.getElementById('edit-photo').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('edit-photo-preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        // Save Profile
        async function saveProfile() {
            const formData = new FormData();
            formData.append('username', document.getElementById('edit-username').value.trim());
            formData.append('password', document.getElementById('edit-password').value);
            formData.append('bio', document.getElementById('edit-bio').value.trim());
            
            const file = document.getElementById('edit-photo').files[0];
            if (file) {
                formData.append('photo', file);
            }

            const btn = document.getElementById('save-profile-btn');
            btn.disabled = true;
            btn.innerText = 'Saving...';

            try {
                const res = await fetch('/update-profile', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.success) {
                    currentUser = data;                    showProfile(data);
                    closeEditProfileModal();
                    alert('Profile updated successfully!');
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Save';
            }
        }

        // Post Detail Modal
        function openPostDetail(postId) {
            const post = currentPosts.find(p => p.id === postId);
            if (!post) return;
            
            currentPostId = postId;
            
            document.getElementById('post-detail-img').src = '/uploads/' + post.photo;
            document.getElementById('post-detail-username').innerText = currentUser.username;
            document.getElementById('post-detail-avatar').innerText = currentUser.username.charAt(0).toUpperCase();
            document.getElementById('post-detail-message').innerText = post.message || 'No message';
            document.getElementById('post-detail-date').innerText = new Date(post.createdAt).toLocaleDateString();
            document.getElementById('post-like-btn').innerHTML = `❤️ ${post.likes || 0}`;
            
            document.getElementById('post-detail-modal').classList.add('show');
        }

        function closePostDetailModal() {
            document.getElementById('post-detail-modal').classList.remove('show');
        }

        // Like Post
        async function likeCurrentPost() {
            if (!currentPostId) return;
            
            try {
                const res = await fetch(`/post/${currentPostId}/like`, { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    const post = currentPosts.find(p => p.id === currentPostId);
                    if (post) {
                        post.likes = data.likes;
                        document.getElementById('post-like-btn').innerHTML = `❤️ ${data.likes}`;
                        renderPosts();
                    }                }
            } catch (err) {
                console.error(err);
            }
        }

        // Edit Post Message
        function editCurrentPost() {
            const post = currentPosts.find(p => p.id === currentPostId);
            if (!post) return;
            
            const newMessage = prompt('Edit your message:', post.message);
            if (newMessage === null) return;
            
            updatePostMessage(currentPostId, newMessage);
        }

        async function updatePostMessage(postId, message) {
            try {
                const res = await fetch(`/post/${postId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                
                if (data.success) {
                    const post = currentPosts.find(p => p.id === postId);
                    if (post) {
                        post.message = message;
                        document.getElementById('post-detail-message').innerText = message || 'No message';
                        renderPosts();
                        alert('Message updated!');
                    }
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            }
        }

        // Delete Post
        function deleteCurrentPost() {
            if (!confirm('Delete this post? This cannot be undone.')) return;
            
            deletePost(currentPostId);
        }

        async function deletePost(postId) {            try {
                const res = await fetch(`/post/${postId}`, { method: 'DELETE' });
                const data = await res.json();
                
                if (data.success) {
                    currentPosts = currentPosts.filter(p => p.id !== postId);
                    renderPosts();
                    closePostDetailModal();
                    alert('Post deleted!');
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            }
        }

        // Enter key for login
        document.getElementById('login-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        // Close modals on outside click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('show');
                }
            });
        });

        // Initialize
        document.getElementById('empty-posts').style.display = 'block';
    </script>
</body>
</html>
