<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoGram</title>
    <link href="https://fonts.googleapis.com/css2?family=System-ui&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFAFA;
            --surface: #FFFFFF;
            --border: #DBDBDB;
            --text-primary: #262626;
            --text-secondary: #8E8E8E;
            --blue: #0095F6;
            --blue-hover: #1877F2;
            --red: #ED4956;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
        }

        /* Top Navigation */
        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
        }

        .nav-logo {
            font-size: 28px;
            font-weight: 700;            font-family: 'Cochin', 'Segoe UI', serif;
            letter-spacing: -1px;
        }

        /* Container */
        .main-container {
            max-width: 935px;
            margin: 0 auto;
            padding: 80px 20px 40px;
        }

        /* Login Card */
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
            max-width: 350px;
            margin: 30px auto;
            text-align: center;
        }

        .login-logo {
            font-size: 42px;
            font-weight: 700;
            font-family: 'Cochin', 'Segoe UI', serif;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .form-input {
            width: 100%;
            padding: 9px 8px;
            margin-bottom: 6px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 12px;
            background: #FAFAFA;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--text-secondary);
        }

        .btn-login {
            width: 100%;
            padding: 7px;
            background: var(--blue);
            color: white;            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: var(--blue-hover);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider-text {
            padding: 0 15px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }

        .error-msg {
            color: var(--red);
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Profile Page */
        .profile-container {
            display: none;        }

        .profile-header {
            display: flex;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .profile-pic-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding-right: 50px;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border);
            padding: 3px;
            background: var(--surface);
        }

        .profile-pic-placeholder {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: 300;
        }

        .profile-info {
            flex: 2;
        }

        .profile-username-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .profile-username {            font-size: 28px;
            font-weight: 300;
            margin-right: 20px;
        }

        .btn-edit {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 5px 9px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-edit:hover {
            background: #FAFAFA;
        }

        .btn-logout {
            background: transparent;
            border: none;
            color: var(--red);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-left: 10px;
        }

        .profile-stats {
            display: flex;
            margin-bottom: 20px;
        }

        .stat-item {
            margin-right: 40px;
        }

        .stat-number {
            font-weight: 600;
            font-size: 16px;
        }

        .stat-label {
            color: var(--text-primary);
            font-size: 14px;
        }

        .profile-bio {
            font-size: 14px;            line-height: 1.5;
        }

        .profile-bio .name {
            font-weight: 600;
        }

        /* Edit Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-form-group {
            margin-bottom: 16px;
        }

        .modal-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .modal-input {
            width: 100%;
            padding: 9px 8px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 14px;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--text-secondary);
        }

        .modal-btn {
            width: 100%;
            padding: 7px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn:disabled {
            opacity: 0.5;
        }
        .photo-upload-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            display: none;
        }

        .photo-upload-label {
            display: block;
            text-align: center;
            padding: 20px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--blue);
            cursor: pointer;
            font-size: 14px;
        }

        .photo-upload-label:hover {
            background: #FAFAFA;
        }

        /* Posts Grid */
        .posts-section {
            margin-top: 30px;
        }

        .posts-header {
            display: flex;
            justify-content: center;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .posts-tab {
            padding: 15px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .posts-tab.active {
            color: var(--text-primary);
            border-top: 1px solid var(--text-primary);
            margin-top: -1px;        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            margin-top: 20px;
        }

        .post-item {
            position: relative;
            aspect-ratio: 1;
            background: #EFEFEF;
            cursor: pointer;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .post-item:hover .post-overlay {
            display: flex;
        }

        .empty-posts {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-posts-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .empty-posts-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .empty-posts-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 735px) {
            .profile-header {
                flex-direction: column;
                padding: 20px 0;
            }

            .profile-pic-container {
                padding-right: 0;
                margin-bottom: 20px;
            }

            .profile-pic,
            .profile-pic-placeholder {
                width: 77px;
                height: 77px;
                font-size: 28px;
            }

            .profile-username {
                font-size: 20px;
            }

            .posts-grid {
                gap: 3px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">        <div class="nav-logo">PhotoGram</div>
    </nav>

    <div class="main-container">
        <!-- Login Section -->
        <div id="login-section">
            <div class="login-card">
                <div class="login-logo">PhotoGram</div>
                
                <p class="error-msg" id="login-error"></p>
                
                <input type="text" class="form-input" id="login-username" placeholder="Username" autocomplete="username">
                <input type="password" class="form-input" id="login-password" placeholder="Password" autocomplete="current-password">
                
                <button class="btn-login" id="login-btn" onclick="login()">Log In</button>
                
                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-text">OR</div>
                    <div class="divider-line"></div>
                </div>
                
                <p style="font-size: 12px; color: var(--text-secondary);">
                    Default: <strong>myaccount</strong> / <strong>1234</strong>
                </p>
            </div>
            
            <div class="login-card" style="padding: 20px;">
                <p style="font-size: 14px;">
                    Don't have an account? 
                    <span style="color: var(--blue); font-weight: 600; cursor: pointer;" onclick="showCredentials()">View Credentials</span>
                </p>
            </div>
        </div>

        <!-- Profile Section -->
        <div id="profile-section" class="profile-container">
            <div class="profile-header">
                <div class="profile-pic-container">
                    <img id="profile-pic" class="profile-pic" src="" alt="Profile" style="display: none;">
                    <div id="profile-pic-placeholder" class="profile-pic-placeholder">M</div>
                </div>
                
                <div class="profile-info">
                    <div class="profile-username-row">
                        <h1 class="profile-username" id="profile-username">myaccount</h1>
                        <button class="btn-edit" onclick="openEditModal()">Edit Profile</button>
                        <button class="btn-logout" onclick="logout()">Log Out</button>
                    </div>
                                        <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-number" id="posts-count">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number">0</span>
                            <span class="stat-label">followers</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number">0</span>
                            <span class="stat-label">following</span>
                        </div>
                    </div>
                    
                    <div class="profile-bio">
                        <span class="name" id="profile-name">myaccount</span>
                        <p id="profile-bio-text">Welcome to my profile 📸</p>
                    </div>
                </div>
            </div>
            
            <!-- Posts Section -->
            <div class="posts-section">
                <div class="posts-header">
                    <div class="posts-tab active">
                        <svg aria-label="" color="#262626" fill="#262626" height="12" role="img" viewBox="0 0 24 24" width="12" style="display: inline; vertical-align: text-bottom; margin-right: 6px;">
                            <rect fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" width="18" x="3" y="3"></rect>
                            <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="9.015" x2="9.015" y1="3" y2="21"></line>
                            <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="14.985" x2="14.985" y1="3" y2="21"></line>
                            <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="21" x2="3" y1="9.015" y2="9.015"></line>
                            <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" x1="21" x2="3" y1="14.985" y2="14.985"></line>
                        </svg>
                        POSTS
                    </div>
                </div>
                
                <div class="posts-grid" id="posts-grid">
                    <!-- Posts will be shown here -->
                </div>
                
                <div class="empty-posts" id="empty-posts">
                    <div class="empty-posts-icon">📷</div>
                    <div class="empty-posts-title">No Posts Yet</div>
                    <div class="empty-posts-text">Upload a photo to get started</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Edit Profile</span>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            
            <div class="modal-body">
                <img id="edit-photo-preview" class="photo-upload-preview" src="" alt="Preview">
                
                <label class="photo-upload-label">
                    <input type="file" id="edit-photo" accept="image/*" style="display: none;" onchange="previewPhoto()">
                    📷 Change Profile Photo
                </label>
                
                <div class="modal-form-group" style="margin-top: 20px;">
                    <label class="modal-label">Username</label>
                    <input type="text" class="modal-input" id="edit-username" placeholder="Username">
                </div>
                
                <div class="modal-form-group">
                    <label class="modal-label">Password</label>
                    <input type="password" class="modal-input" id="edit-password" placeholder="New Password (optional)">
                </div>
                
                <div class="modal-form-group">
                    <label class="modal-label">Bio</label>
                    <input type="text" class="modal-input" id="edit-bio" placeholder="Bio" maxlength="150">
                </div>
                
                <button class="modal-btn" id="save-btn" onclick="saveProfile()">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        // Show Credentials Hint
        function showCredentials() {
            alert('Default Login:\nUsername: myaccount\nPassword: 1234');
        }

        // Login
        async function login() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            if (!username || !password) {
                errorEl.innerText = 'Please fill in all fields';
                errorEl.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Logging in...';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    currentUser = data;
                    showProfile(data);
                } else {
                    errorEl.innerText = data.message;
                    errorEl.classList.add('show');
                }
            } catch (err) {
                errorEl.innerText = 'Connection error. Please try again.';
                errorEl.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Log In';
            }
        }

        // Show Profile
        function showProfile(data) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('profile-section').style.display = 'block';
            
            document.getElementById('profile-username').innerText = data.username;
            document.getElementById('profile-name').innerText = data.username;
            document.getElementById('profile-bio-text').innerText = data.bio || 'Welcome to my profile 📸';
            
            const pic = document.getElementById('profile-pic');
            const placeholder = document.getElementById('profile-pic-placeholder');
            
            if (data.photo) {
                pic.src = '/uploads/' + data.photo + '?t=' + new Date().getTime();
                pic.style.display = 'block';
                placeholder.style.display = 'none';
                                // Show in posts grid
                document.getElementById('empty-posts').style.display = 'none';
                document.getElementById('posts-grid').innerHTML = `
                    <div class="post-item">
                        <img src="${pic.src}" alt="Post">
                        <div class="post-overlay">❤️ 1</div>
                    </div>
                `;
                document.getElementById('posts-count').innerText = '1';
            } else {
                pic.style.display = 'none';
                placeholder.style.display = 'flex';
                placeholder.innerText = data.username.charAt(0).toUpperCase();
            }
        }

        // Logout
        function logout() {
            if (!confirm('Log out of this account?')) return;
            
            currentUser = null;
            document.getElementById('profile-section').style.display = 'none';
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
            document.getElementById('login-error').classList.remove('show');
        }

        // Edit Modal
        function openEditModal() {
            document.getElementById('edit-modal').classList.add('show');
            document.getElementById('edit-username').value = currentUser.username;
            document.getElementById('edit-bio').value = currentUser.bio || '';
            document.getElementById('edit-password').value = '';
            
            if (currentUser.photo) {
                const preview = document.getElementById('edit-photo-preview');
                preview.src = '/uploads/' + currentUser.photo + '?t=' + new Date().getTime();
                preview.style.display = 'block';
            }
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('show');
            document.getElementById('edit-photo-preview').style.display = 'none';
            document.getElementById('edit-photo').value = '';
        }

        // Preview Photo
        function previewPhoto() {            const file = document.getElementById('edit-photo').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('edit-photo-preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        // Save Profile
        async function saveProfile() {
            const formData = new FormData();
            formData.append('username', document.getElementById('edit-username').value.trim());
            formData.append('password', document.getElementById('edit-password').value);
            formData.append('bio', document.getElementById('edit-bio').value.trim());
            
            const file = document.getElementById('edit-photo').files[0];
            if (file) {
                formData.append('photo', file);
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = 'Saving...';

            try {
                const res = await fetch('/update', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.success) {
                    currentUser = data;
                    showProfile(data);
                    closeEditModal();
                    alert('Profile updated successfully!');
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                alert('Connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Save';
            }
        }
        // Enter key for login
        document.getElementById('login-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        // Close modal on outside click
        document.getElementById('edit-modal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });
    </script>
</body>
</html>
