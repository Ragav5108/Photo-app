<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Glowing Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-primary: #00f5ff;
            --glow-secondary: #ff00ff;
            --glow-accent: #ffff00;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,245,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle, rgba(255,0,255,0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Container */
        .container {
            background: var(--bg-card);
            border-radius: 20px;
            border: 2px solid transparent;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3),
                        0 0 60px rgba(255, 0, 255, 0.2),
                        inset 0 0 30px rgba(0, 245, 255, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            position: relative;
            animation: containerGlow 3s ease-in-out infinite;
        }

        @keyframes containerGlow {
            0%, 100% { 
                border-color: rgba(0, 245, 255, 0.5);
                box-shadow: 0 0 30px rgba(0, 245, 255, 0.3),
                            0 0 60px rgba(255, 0, 255, 0.2),
                            inset 0 0 30px rgba(0, 245, 255, 0.1);
            }
            50% { 
                border-color: rgba(255, 0, 255, 0.5);
                box-shadow: 0 0 40px rgba(255, 0, 255, 0.4),
                            0 0 80px rgba(0, 245, 255, 0.3),
                            inset 0 0 40px rgba(255, 0, 255, 0.1);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--glow-primary),
                         0 0 20px var(--glow-primary),
                         0 0 30px var(--glow-primary);
            animation: textGlow 2s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { 
                text-shadow: 0 0 10px var(--glow-primary),
                             0 0 20px var(--glow-primary),
                             0 0 30px var(--glow-primary);
            }
            50% { 
                text-shadow: 0 0 20px var(--glow-secondary),
                             0 0 30px var(--glow-secondary),
                             0 0 40px var(--glow-secondary);
            }
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Profile Photo */
        .photo-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 25px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, var(--glow-primary), var(--glow-secondary));
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.5),
                        0 0 60px rgba(255, 0, 255, 0.3);
            animation: photoGlow 3s ease-in-out infinite;
        }

        @keyframes photoGlow {
            0%, 100% { 
                box-shadow: 0 0 30px rgba(0, 245, 255, 0.5),
                            0 0 60px rgba(255, 0, 255, 0.3);
            }            50% { 
                box-shadow: 0 0 50px rgba(255, 0, 255, 0.6),
                            0 0 80px rgba(0, 245, 255, 0.4);
            }
        }

        .photo-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .photo-placeholder {
            font-size: 64px;
            color: var(--glow-primary);
            text-shadow: 0 0 20px var(--glow-primary);
        }

        /* Username */
        .username {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--glow-primary);
        }

        /* Message */
        .message-box {
            background: rgba(0, 245, 255, 0.05);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(0, 245, 255, 0.1);        }

        .message-text {
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.6;
            text-shadow: 0 0 5px var(--glow-primary);
        }

        .message-text.empty {
            color: var(--text-secondary);
            font-style: italic;
            text-shadow: none;
        }

        /* Admin Button */
        .admin-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--glow-primary);
            border-radius: 10px;
            color: var(--glow-primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .admin-btn:hover {
            background: var(--glow-primary);
            color: var(--bg-dark);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.6),
                        0 0 40px rgba(0, 245, 255, 0.4);
        }

        /* Loading */
        .loading {
            text-align: center;
            color: var(--glow-primary);
            font-size: 18px;
            padding: 40px;
            text-shadow: 0 0 10px var(--glow-primary);        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .photo-container {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>

    <div class="container">
        <div class="header">
            <h1>✨ My Profile</h1>
            <p>Welcome to my glowing world</p>
        </div>

        <div id="loading" class="loading">Loading</div>

        <div id="profile-content" style="display: none;">
            <div class="photo-container">
                <div class="photo-wrapper">
                    <img id="profile-photo" class="profile-photo" src="" alt="Profile">
                    <div id="photo-placeholder" class="photo-placeholder">👤</div>
                </div>
            </div>
            <h2 class="username" id="display-username">Loading...</h2>

            <div class="message-box">
                <p class="message-text empty" id="display-message">No message</p>
            </div>

            <a href="admin.html" class="admin-btn">⚡ Admin Panel</a>
        </div>
    </div>

    <script>
        // Load Public Data
        async function loadProfile() {
            try {
                const res = await fetch('/public');
                const data = await res.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('profile-content').style.display = 'block';

                // Username
                document.getElementById('display-username').innerText = data.username;

                // Photo
                const photo = document.getElementById('profile-photo');
                const placeholder = document.getElementById('photo-placeholder');

                if (data.photo) {
                    photo.src = '/uploads/' + data.photo + '?t=' + new Date().getTime();
                    photo.style.display = 'block';
                    placeholder.style.display = 'none';
                } else {
                    photo.style.display = 'none';
                    placeholder.style.display = 'flex';
                }

                // Message
                const messageEl = document.getElementById('display-message');
                if (data.message) {
                    messageEl.innerText = data.message;
                    messageEl.classList.remove('empty');
                } else {
                    messageEl.innerText = 'No message';
                    messageEl.classList.add('empty');
                }
            } catch (err) {
                document.getElementById('loading').innerText = 'Error loading profile';
                document.getElementById('loading').style.color = '#ff0055';
            }        }

        // Initialize
        loadProfile();

        // Auto-refresh every 30 seconds
        setInterval(loadProfile, 30000);
    </script>
</body>
</html>
